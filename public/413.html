<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload too large — JewelFlow</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f7f9fc; color: #16213d; padding: 24px;
        }
        .card {
            max-width: 460px; width: 100%; background: #fff; border: 1px solid #e2e8f0;
            border-radius: 20px; padding: 36px 32px; text-align: center;
            box-shadow: 0 18px 44px rgba(15, 23, 42, 0.06);
        }
        .icon {
            width: 56px; height: 56px; border-radius: 16px; margin: 0 auto 18px;
            display: flex; align-items: center; justify-content: center;
            background: #fff7e8; color: #b45309; font-size: 28px;
        }
        h1 { margin: 0 0 10px; font-size: 20px; }
        p { margin: 0 0 8px; color: #475569; font-size: 14px; line-height: 1.6; }
        .hint { margin-top: 16px; font-size: 13px; color: #64748b; }
        .btn {
            display: inline-block; margin-top: 22px; padding: 10px 20px; border-radius: 12px;
            background: #0f766e; color: #fff; text-decoration: none; font-weight: 600; font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">⤒</div>
        <h1>Those files are too large to upload</h1>
        <p>The images you selected add up to more than the upload limit.</p>
        <p class="hint">Please add up to <strong>4 images</strong>, each under <strong>5&nbsp;MB</strong>, and try again. Tip: phone photos can be shrunk before uploading.</p>
        <a class="btn" href="javascript:history.back()">Go back</a>
    </div>
</body>
</html>
